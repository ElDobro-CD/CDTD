<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Karten Spiel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      margin-top: 20px;
    }

    #score {
      font-size: 20px;
      margin: 10px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      width: 120px;
      height: 160px;
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    /* 🎯 Bild zentriert + Animation */
    #gameOverImage {
      margin-top: 30px;
      display: flex;
      justify-content: center;
    }

    #gameOverImage img {
      width: 300px;
      border-radius: 10px;

      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <h1>Karten Spiel</h1>
  <div id="score">Score: 0</div>

  <div class="cards">
    <div class="card" onclick="drawCard(0)">Karte 1</div>
    <div class="card" onclick="drawCard(1)">Karte 2</div>
  </div>

  <div id="message"></div>

  <!-- Bild Container -->
  <div id="gameOverImage"></div>

  <button onclick="restartGame()">Neustart</button>

  <script>
    let cards = [];
    let score = 0;
    let gameOver = false;

    function initRound() {
      cards = [];
      cards.push(true);
      cards.push(false);
      shuffle(cards);
      renderCards();
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function renderCards() {
      const cardElements = document.querySelectorAll('.card');
      cardElements.forEach((el) => {
        el.textContent = "Verdeckt";
        el.style.background = "#333";
      });

      document.getElementById("message").textContent = "";
    }

    function drawCard(index) {
      if (gameOver) return;

      const isKastenholz = cards[index];
      const cardElements = document.querySelectorAll('.card');

      if (isKastenholz) {
        cardElements[index].textContent = "Kastenholz";
        cardElements[index].style.background = "green";

        score++;
        updateScore();

        setTimeout(() => {
          initRound();
        }, 800);

      } else {
        cardElements[index].textContent = "Keine Kastenholz";
        cardElements[index].style.background = "red";

        gameOver = true;

        document.getElementById("message").textContent = "Spiel vorbei!";

        // 🎯 Bild anzeigen
        document.getElementById("gameOverImage").innerHTML = `
          <img src="https://scontent-dus1-1.xx.fbcdn.net/v/t39.30808-6/506793581_9927618853952341_4533149551032068414_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=53a332&_nc_ohc=BmDn1YqOs80Q7kNvwGvo2xw&_nc_oc=Adp7EYtDkGaqv-3wEpmHYIg0DYnVIegNxHelOPkc8_xboYg1juLkcU_LK8JmhRYKvu7gZwf4ypha-ztZvu0OBykW&_nc_zt=23&_nc_ht=scontent-dus1-1.xx&_nc_gid=fLwPDxR91eGLdSQstnsOfg&_nc_ss=7a30f&oh=00_AfyeQvWcVJ0khYcAOam5MSvHo25QG_N4gXCs-BeeDgPP1A&oe=69CC9433" 
          alt="Game Over">
        `;
      }
    }

    function updateScore() {
      document.getElementById("score").textContent = "Score: " + score;
    }

    function restartGame() {
      score = 0;
      gameOver = false;
      updateScore();

      document.getElementById("gameOverImage").innerHTML = "";
      document.getElementById("message").textContent = "";

      initRound();
    }

    initRound();
  </script>

</body>
</html>
