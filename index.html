<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kastenholz Spiel</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      margin-top: 20px;
    }

    #scoreboard {
      position: absolute;
      left: 20px;
      top: 100px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      min-width: 180px;
      text-align: left;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      width: 120px;
      height: 160px;
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
    }

    #gameOverImage img {
      width: 300px;
      border-radius: 10px;
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    #startScreen {
      margin-top: 50px;
    }
  </style>
</head>

<body>

<h1>Kastenholz Spiel</h1>

<!-- Start -->
<div id="startScreen">
  <input id="playerName" placeholder="Dein Name">
  <button onclick="startGame()">Start</button>
</div>

<!-- Spiel -->
<div id="gameArea" style="display:none;">
  <div id="score">Score: 0</div>

  <div class="cards">
    <div class="card" onclick="drawCard(0)">Karte 1</div>
    <div class="card" onclick="drawCard(1)">Karte 2</div>
  </div>

  <div id="message"></div>

  <div id="gameOverImage"></div>

  <button onclick="restartGame()">Neustart</button>
</div>

<!-- Scoreboard -->
<div id="scoreboard">
  <h3>Top 10</h3>
  <ul id="scoreList"></ul>
</div>

<!-- YouTube Musik -->
<iframe
  id="ytplayer"
  width="0"
  height="0"
  src=""
  allow="autoplay">
</iframe>

<script>
/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJECT.firebaseapp.com",
  projectId: "DEIN_PROJECT_ID",
  storageBucket: "DEIN_BUCKET",
  messagingSenderId: "DEIN_ID",
  appId: "DEIN_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* Variablen */
let cards = [];
let score = 0;
let gameOver = false;
let playerName = "";

/* Start */
function startGame() {
  playerName = document.getElementById("playerName").value;

  if (!playerName) {
    alert("Bitte Namen eingeben!");
    return;
  }

  // 🎵 Musik starten
  document.getElementById("ytplayer").src =
    "https://www.youtube.com/embed/qgTRjgU8k1Q?autoplay=1&loop=1&playlist=qgTRjgU8k1Q";

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameArea").style.display = "block";

  loadLeaderboard();
  initRound();
}

/* Karten */
function initRound() {
  cards = [true, false];
  shuffle(cards);
  renderCards();
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function renderCards() {
  document.querySelectorAll(".card").forEach(c => {
    c.textContent = "Verdeckt";
    c.style.background = "#333";
  });
  document.getElementById("message").textContent = "";
}

/* Klick auf Karte */
function drawCard(index) {
  if (gameOver) return;

  const isKastenholz = cards[index];
  const card = document.querySelectorAll(".card")[index];

  if (isKastenholz) {
    card.textContent = "Kastenholz";
    card.style.background = "green";

    score++;
    document.getElementById("score").textContent = "Score: " + score;

    setTimeout(initRound, 800);

  } else {
    card.textContent = "Keine Kastenholz";
    card.style.background = "red";

    gameOver = true;
    document.getElementById("message").textContent = "Spiel vorbei!";

    // 🖼️ Bild anzeigen
    document.getElementById("gameOverImage").innerHTML = `
      <img src="https://scontent-dus1-1.xx.fbcdn.net/v/t39.30808-6/506793581_9927618853952341_4533149551032068414_n.jpg">
    `;

    // 💾 Score speichern
    db.collection("scores").add({
      name: playerName,
      score: score,
      timestamp: Date.now()
    });

    loadLeaderboard();
  }
}

/* Leaderboard Top 10 */
function loadLeaderboard() {
  db.collection("scores")
    .orderBy("score", "desc")
    .limit(10)
    .onSnapshot(snapshot => {
      const list = document.getElementById("scoreList");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();
        const li = document.createElement("li");
        li.textContent = data.name + ": " + data.score;
        list.appendChild(li);
      });
    });
}

/* Neustart */
function restartGame() {
  score = 0;
  gameOver = false;
  document.getElementById("score").textContent = "Score: 0";
  document.getElementById("gameOverImage").innerHTML = "";
  initRound();
}
</script>

</body>
</html>
