<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Karten Spiel</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      margin-top: 20px;
    }

    #score {
      font-size: 20px;
      margin: 10px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      width: 120px;
      height: 160px;
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    /* Startscreen */
    #startScreen {
      margin-top: 50px;
    }

    /* Scoreboard links */
    #scoreboard {
      position: absolute;
      left: 20px;
      top: 100px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
      min-width: 150px;
    }

    /* Game Over Bild */
    #gameOverImage {
      margin-top: 30px;
      display: flex;
      justify-content: center;
    }

    #gameOverImage img {
      width: 300px;
      border-radius: 10px;
      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <h1>Karten Spiel</h1>

  <!-- Startscreen -->
  <div id="startScreen">
    <h2>Spiel starten</h2>
    <input type="text" id="playerName" placeholder="Dein Name">
    <button onclick="startGame()">Start</button>
  </div>

  <!-- Spielbereich -->
  <div id="gameArea" style="display:none;">

    <div id="score">Score: 0</div>

    <div class="cards">
      <div class="card" onclick="drawCard(0)">Karte 1</div>
      <div class="card" onclick="drawCard(1)">Karte 2</div>
    </div>

    <div id="message"></div>

    <div id="gameOverImage"></div>

    <button onclick="restartGame()">Neustart</button>

  </div>

  <!-- Scoreboard -->
  <div id="scoreboard">
    <h3>Scoreboard</h3>
    <ul id="scoreList"></ul>
  </div>

  <!-- YouTube Musik -->
  <iframe
    width="0"
    height="0"
    src="https://www.youtube.com/embed/qgTRjgU8k1Q?autoplay=1&mute=1&loop=1&playlist=qgTRjgU8k1Q"
    frameborder="0"
    allow="autoplay">
  </iframe>

  <script>
    let cards = [];
    let score = 0;
    let gameOver = false;
    let playerName = "";
    let leaderboard = [];

    function startGame() {
      playerName = document.getElementById("playerName").value;

      if (!playerName) {
        alert("Bitte Namen eingeben!");
        return;
      }

      document.getElementById("startScreen").style.display = "none";
      document.getElementById("gameArea").style.display = "block";

      initRound();
    }

    function initRound() {
      cards = [];
      cards.push(true);
      cards.push(false);
      shuffle(cards);
      renderCards();
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function renderCards() {
      const cardElements = document.querySelectorAll('.card');
      cardElements.forEach((el) => {
        el.textContent = "Verdeckt";
        el.style.background = "#333";
      });

      document.getElementById("message").textContent = "";
    }

    function drawCard(index) {
      if (gameOver) return;

      const isKastenholz = cards[index];
      const cardElements = document.querySelectorAll('.card');

      if (isKastenholz) {
        cardElements[index].textContent = "Kastenholz";
        cardElements[index].style.background = "green";

        score++;
        updateScore();

        setTimeout(() => {
          initRound();
        }, 800);

      } else {
        cardElements[index].textContent = "Keine Kastenholz";
        cardElements[index].style.background = "red";

        gameOver = true;

        document.getElementById("message").textContent = "Spiel vorbei!";

        // Bild anzeigen
        document.getElementById("gameOverImage").innerHTML = `
          <img src="https://scontent-dus1-1.xx.fbcdn.net/v/t39.30808-6/506793581_9927618853952341_4533149551032068414_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=53a332&_nc_ohc=BmDn1YqOs80Q7kNvwGvo2xw&_nc_oc=Adp7EYtDkGaqv-3wEpmHYIg0DYnVIegNxHelOPkc8_xboYg1juLkcU_LK8JmhRYKvu7gZwf4ypha-ztZvu0OBykW&_nc_zt=23&_nc_ht=scontent-dus1-1.xx&_nc_gid=fLwPDxR91eGLdSQstnsOfg&_nc_ss=7a30f&oh=00_AfyeQvWcVJ0khYcAOam5MSvHo25QG_N4gXCs-BeeDgPP1A&oe=69CC9433">
        `;

        // Score speichern
        leaderboard.push({ name: playerName, score: score });
        updateScoreboard();
      }
    }

    function updateScore() {
      document.getElementById("score").textContent = "Score: " + score;
    }

    function updateScoreboard() {
      const list = document.getElementById("scoreList");
      list.innerHTML = "";

      leaderboard.sort((a, b) => b.score - a.score);

      leaderboard.forEach(player => {
        const li = document.createElement("li");
        li.textContent = player.name + ": " + player.score;
        list.appendChild(li);
      });
    }

    function restartGame() {
      score = 0;
      gameOver = false;

      document.getElementById("gameOverImage").innerHTML = "";
      document.getElementById("message").textContent = "";

      updateScore();
      initRound();
    }
  </script>

</body>
</html>
