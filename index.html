<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Karten Spiel</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    #scoreboard {
      position: absolute;
      left: 20px;
      top: 100px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      min-width: 180px;
      text-align: left;
    }

    .card {
      width: 120px;
      height: 160px;
      background: #333;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    #gameOverImage img {
      width: 300px;
      border-radius: 10px;
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

<h1>Karten Spiel</h1>

<input id="playerName" placeholder="Dein Name">
<button onclick="startGame()">Start</button>

<h2 id="score">Score: 0</h2>

<div>
  <div class="card" onclick="drawCard(0)" id="card0">Karte</div>
  <div class="card" onclick="drawCard(1)" id="card1">Karte</div>
</div>

<p id="message"></p>
<div id="gameOverImage"></div>

<button onclick="restartGame()">Neustart</button>

<!-- Scoreboard -->
<div id="scoreboard">
  <h3>Top 10</h3>
  <ul id="scoreList"></ul>
</div>

<!-- YouTube Musik (unsichtbar) -->
<iframe id="ytplayer" width="0" height="0" allow="autoplay"></iframe>

<script>

/* 🔥 Deine Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyClja3st19oZ-aDcXzah4GZ_pCpfPfzWiQ",
  authDomain: "kastenholzspiel.firebaseapp.com",
  projectId: "kastenholzspiel",
  storageBucket: "kastenholzspiel.firebasestorage.app",
  messagingSenderId: "975574226702",
  appId: "1:975574226702:web:f0dd3ec99b74337c59a95f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cards = [];
let score = 0;
let gameOver = false;
let playerName = "";

/* Start */
function startGame() {
  playerName = document.getElementById("playerName").value;

  if (!playerName) {
    alert("Bitte Namen eingeben!");
    return;
  }

  // 🎶 Musik starten
  document.getElementById("ytplayer").src =
    "https://www.youtube.com/embed/jQwNlcCwf9Y?autoplay=1&loop=1&playlist=jQwNlcCwf9Y";

  initRound();
}

/* Runde */
function initRound() {
  cards = [true, false];
  shuffle(cards);

  document.getElementById("card0").textContent = "Verdeckt";
  document.getElementById("card1").textContent = "Verdeckt";
  document.getElementById("message").textContent = "";
  document.getElementById("gameOverImage").innerHTML = "";

  gameOver = false;
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

/* Karte ziehen */
function drawCard(index) {
  if (gameOver) return;

  const isKastenholz = cards[index];
  const cardEl = document.getElementById("card" + index);

  if (isKastenholz) {
    cardEl.textContent = "Kastenholz";
    cardEl.style.background = "green";

    score++;
    document.getElementById("score").textContent = "Score: " + score;

    setTimeout(initRound, 800);

  } else {
    cardEl.textContent = "Keine Kastenholz";
    cardEl.style.background = "red";

    gameOver = true;
    document.getElementById("message").textContent = "Spiel vorbei!";

    document.getElementById("gameOverImage").innerHTML = `
      <img src="https://i.imgur.com/4AiXzf8.jpg">
    `;

    db.collection("scores").add({
      name: playerName,
      score: score,
      timestamp: Date.now()
    });
  }
}

/* Leaderboard */
function loadLeaderboard() {
  db.collection("scores")
    .orderBy("score", "desc")
    .limit(10)
    .onSnapshot(snapshot => {
      const list = document.getElementById("scoreList");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();
        const li = document.createElement("li");
        li.textContent = data.name + ": " + data.score;
        list.appendChild(li);
      });
    });
}

/* Neustart */
function restartGame() {
  score = 0;
  document.getElementById("score").textContent = "Score: 0";
  initRound();
}

/* Auto Load Leaderboard */
window.onload = function() {
  loadLeaderboard();
};

</script>

</body>
</html>
