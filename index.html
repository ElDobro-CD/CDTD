<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kastenholz Spiel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;

  /* 🌄 Hintergrundbild */
  background-image: url("https://scontent-dus1-1.xx.fbcdn.net/v/t39.30808-6/506793581_9927618853952341_4533149551032068414_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=53a332&_nc_ohc=BmDn1YqOs80Q7kNvwGvo2xw&_nc_oc=Adp7EYtDkGaqv-3wEpmHYIg0DYnVIegNxHelOPkc8_xboYg1juLkcU_LK8JmhRYKvu7gZwf4ypha-ztZvu0OBykW&_nc_zt=23&_nc_ht=scontent-dus1-1.xx&_nc_gid=fLwPDxR91eGLdSQstnsOfg&_nc_ss=7a30f&oh=00_AfyeQvWcVJ0khYcAOam5MSvHo25QG_N4gXCs-BeeDgPP1A&oe=69CC9433");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* Overlay für bessere Lesbarkeit */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

h1, h2, h3, p, input, button {
  color: white;
}

#scoreboard {
  position: absolute;
  left: 20px;
  top: 100px;
  background: rgba(255,255,255,0.9);
  padding: 15px;
  border-radius: 10px;
  min-width: 180px;
  text-align: left;
  color: black;
}

.card {
  width: 120px;
  height: 160px;
  background: #333;
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
  user-select: none;
}

#gameOverImage img {
  width: 300px;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Karten Spiel</h1>

<input id="playerName" placeholder="Dein Name">
<button onclick="startGame()">Start</button>

<h2 id="score">Score: 0</h2>
<h3 id="streak">Streak: 0 / 10</h3>

<div>
  <div class="card" onclick="drawCard(0)" id="card0">Karte</div>
  <div class="card" onclick="drawCard(1)" id="card1">Karte</div>
</div>

<p id="message"></p>

<div id="gameOverImage"></div>

<button onclick="restartGame()">Neustart</button>

<div id="scoreboard">
  <h3>Top 10</h3>
  <ul id="scoreList"></ul>
</div>

<!-- YouTube Musik -->
<iframe id="ytplayer" width="0" height="0" allow="autoplay"></iframe>

<script>

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyClja3st19oZ-aDcXzah4GZ_pCpfPfzWiQ",
  authDomain: "kastenholzspiel.firebaseapp.com",
  projectId: "kastenholzspiel",
  storageBucket: "kastenholzspiel.firebasestorage.app",
  messagingSenderId: "975574226702",
  appId: "1:975574226702:web:f0dd3ec99b74337c59a95f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* State */
let cards = [];
let score = 0;
let streak = 0;
let gameOver = false;
let playerName = "";

/* Start */
function startGame() {
  playerName = document.getElementById("playerName").value;

  if (!playerName) {
    alert("Bitte Namen eingeben!");
    return;
  }

  // 🎵 Musik starten
  document.getElementById("ytplayer").src =
    "https://www.youtube.com/embed/jQwNlcCwf9Y?autoplay=1&loop=1&playlist=jQwNlcCwf9Y";

  score = 0;
  streak = 0;
  gameOver = false;

  updateUI();
  resetCards();
  initRound();
}

/* Karten reset */
function resetCards() {
  document.getElementById("card0").style.background = "#333";
  document.getElementById("card1").style.background = "#333";
  document.getElementById("card0").textContent = "Karte";
  document.getElementById("card1").textContent = "Karte";
}

/* Runde */
function initRound() {
  cards = [true, false];
  shuffle(cards);

  document.getElementById("message").textContent = "";
  document.getElementById("gameOverImage").innerHTML = "";
}

/* Shuffle */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

/* Karte ziehen */
function drawCard(index) {
  if (gameOver) return;

  const isKastenholz = cards[index];
  const cardEl = document.getElementById("card" + index);

  if (isKastenholz) {
    cardEl.textContent = "Kastenholz";
    cardEl.style.background = "green";

    score++;
    streak++;

    updateUI();

    if (streak >= 10) {
      winGame();
      return;
    }

    setTimeout(() => {
      resetCards();
      initRound();
    }, 600);

  } else {
    cardEl.textContent = "Keine Kastenholz";
    cardEl.style.background = "red";

    gameOver = true;
    streak = 0;

    document.getElementById("message").textContent = "Spiel vorbei!";

    const imgUrl = "https://scontent-dus1-1.xx.fbcdn.net/v/t39.30808-6/506793581_9927618853952341_4533149551032068414_n.jpg";

    document.getElementById("gameOverImage").innerHTML =
      `<img src="${imgUrl}" onerror="this.style.display='none'">`;

    saveScore();
  }

  updateUI();
}

/* UI */
function updateUI() {
  document.getElementById("score").textContent = "Score: " + score;
  document.getElementById("streak").textContent = "Streak: " + streak + " / 10";
}

/* Win */
function winGame() {
  gameOver = true;

  document.getElementById("message").textContent =
    "🎉 GEWONNEN! Du darfst einen 10er im Casino einzahlen 😎";

  const imgUrl = "https://scontent-dus1-1.xx.fbcdn.net/v/t39.30808-6/506793581_9927618853952341_4533149551032068414_n.jpg";

  document.getElementById("gameOverImage").innerHTML =
    `<img src="${imgUrl}" onerror="this.style.display='none'">`;

  saveScore();
}

/* Score speichern */
function saveScore() {
  db.collection("scores").add({
    name: playerName,
    score: score,
    timestamp: Date.now()
  });
}

/* Leaderboard */
function loadLeaderboard() {
  db.collection("scores")
    .orderBy("score", "desc")
    .limit(10)
    .onSnapshot(snapshot => {
      const list = document.getElementById("scoreList");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();
        const li = document.createElement("li");
        li.textContent = data.name + ": " + data.score;
        list.appendChild(li);
      });
    });
}

/* Neustart */
function restartGame() {
  score = 0;
  streak = 0;
  gameOver = false;

  document.getElementById("message").textContent = "";
  document.getElementById("gameOverImage").innerHTML = "";

  resetCards();
  updateUI();
  initRound();
}

/* Init */
window.onload = function() {
  loadLeaderboard();
};

</script>

</body>
</html>
