<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Karten Spiel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }
    h1 {
      margin-top: 20px;
    }
    #score {
      font-size: 20px;
      margin: 10px;
    }
    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }
    .card {
      width: 120px;
      height: 160px;
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.3s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    #message {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Karten Spiel</h1>
  <div id="score">Score: 0</div>

  <div class="cards">
    <div class="card" onclick="drawCard(0)">Karte 1</div>
    <div class="card" onclick="drawCard(1)">Karte 2</div>
  </div>

  <div id="message"></div>

  <button onclick="restartGame()">Neustart</button>

  <script>
    let cards = [];
    let score = 0;
    let gameOver = false;

    function initRound() {
      cards = [];
      // eine Kastenholz Karte (true) und eine normale (false)
      cards.push(true);
      cards.push(false);
      shuffle(cards);
      renderCards();
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function renderCards() {
      const cardElements = document.querySelectorAll('.card');
      cardElements.forEach((el, index) => {
        el.textContent = "Verdeckt";
        el.style.background = "#333";
      });
      document.getElementById("message").textContent = "";
    }

    function drawCard(index) {
      if (gameOver) return;

      const isKastenholz = cards[index];
      const cardElements = document.querySelectorAll('.card');

      if (isKastenholz) {
        cardElements[index].textContent = "Kastenholz";
        cardElements[index].style.background = "green";
        score++;
        updateScore();
        setTimeout(() => {
          initRound();
        }, 800);
      } else {
        cardElements[index].textContent = "Keine Kastenholz";
        cardElements[index].style.background = "red";
        gameOver = true;
        document.getElementById("message").textContent = "Spiel vorbei!";
      }
    }

    function updateScore() {
      document.getElementById("score").textContent = "Score: " + score;
    }

    function restartGame() {
      score = 0;
      gameOver = false;
      updateScore();
      initRound();
    }

    // Start game
    initRound();
  </script>

</body>
</html>
